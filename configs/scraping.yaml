# CIAN data collection parameters
# Run: python -m src.scraping.run collect --config configs/scraping.yaml

db_path: data/cian.sqlite
raw_dir: data/raw

# CIAN regions: 2 = St. Petersburg, 4588 = Leningrad Oblast
# (the oblast is included for Murino/Kudrovo/Devyatkino; the distance filter is applied during cleaning)
regions:
  spb: 2
  lenobl: 4588

# Room types in the CIAN jsonQuery: 1..6 = number of rooms, 9 = studio, 7 = open plan
rooms: [1, 2, 3, 4, 5, 6, 7, 9]

# Starting price bands, RUB/mo. If a segment holds more than max_offers_per_segment,
# the band is split in half automatically (adaptive segmentation).
price_bands:
  - [1, 25000]
  - [25000, 35000]
  - [35000, 50000]
  - [50000, 80000]
  - [80000, 150000]
  - [150000, 1000000]

# Antibot politeness
min_delay_sec: 3.0
max_delay_sec: 8.0
max_pages_per_segment: 54      # safety cap on pagination
# Empirical (measured 2026-07-02): the CIAN API returns at most ~700 listings
# (~25 pages) per query regardless of totalCount. The threshold sits below this limit:
max_offers_per_segment: 620    # threshold for splitting a price band
# proxy: "http://user:pass@host:port"   # uncomment if needed
proxy: null
