# Параметры сбора данных с ЦИАН
# Запуск: python -m src.scraping.run collect --config configs/scraping.yaml

db_path: data/cian.sqlite
raw_dir: data/raw

# Регионы ЦИАН: 2 = Санкт-Петербург, 4588 = Ленинградская область
# (ЛО включаем ради Мурино/Кудрово/Девяткино; фильтр по удалённости сделаем на этапе чистки)
regions:
  spb: 2
  lenobl: 4588

# Типы комнатности в jsonQuery ЦИАН: 1..6 = число комнат, 9 = студия, 7 = свободная планировка
rooms: [1, 2, 3, 4, 5, 6, 7, 9]

# Стартовые ценовые полосы, ₽/мес. Если в сегменте больше max_offers_per_segment,
# полоса автоматически делится пополам (адаптивная сегментация).
price_bands:
  - [1, 25000]
  - [25000, 35000]
  - [35000, 50000]
  - [50000, 80000]
  - [80000, 150000]
  - [150000, 1000000]

# Антибот-вежливость
min_delay_sec: 3.0
max_delay_sec: 8.0
max_pages_per_segment: 54      # страховочный потолок пагинации
# Эмпирика (замер 02.07.2026): API ЦИАН отдаёт максимум ~700 объявлений
# (~25 страниц) на запрос независимо от totalCount. Порог ниже этого лимита:
max_offers_per_segment: 620    # порог для деления ценовой полосы
# proxy: "http://user:pass@host:port"   # раскомментируй при необходимости
proxy: null
