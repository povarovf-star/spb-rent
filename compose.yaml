services:
  api:
    build: .
    image: spb-rent:latest
    command: python -m uvicorn src.app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    mem_limit: 400m
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 5s
      retries: 3

  dashboard:
    image: spb-rent:latest
    depends_on:
      api:
        condition: service_healthy
    command: python -m uvicorn src.app.site:app --host 0.0.0.0 --port 8501
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    restart: unless-stopped
    mem_limit: 350m
